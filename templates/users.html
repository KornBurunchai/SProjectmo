<!DOCTYPE html>
<html>

<head>
    <title>User Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

        <div class="container">

            <a class="navbar-brand" href="/admin">Asset System</a>

            <div>

                <a href="/admin" class="btn btn-outline-light me-2">Assets</a>

                <a href="/asset_types" class="btn btn-outline-light me-2">Asset Types</a>

                <a href="/users" class="btn btn-success">Users</a>

            </div>

        </div>

    </nav>


    <div class="container mt-4">

        <h2>User Management</h2>

        <!-- ADD + SEARCH -->
        <div class="mb-3 d-flex justify-content-between">

            <a href="/users/add" class="btn btn-success">
                Add User
            </a>

            <form action="/users/search" method="get" class="d-flex">

                <input type="text" name="keyword" placeholder="Search user..." class="form-control me-2">

                <button class="btn btn-primary">Search</button>

            </form>

        </div>


        <table class="table table-bordered table-striped">

            <thead class="table-dark">

                <tr>

                    <th>ID</th>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Email</th>
                    <th>Username</th>
                    <th>Role</th>
                    <th>Action</th>

                </tr>

            </thead>

            <tbody>

                {% for u in users %}

                <tr>

                    <td>{{u.user_id}}</td>
                    <td>{{u.first_name}}</td>
                    <td>{{u.last_name}}</td>
                    <td>{{u.email}}</td>
                    <td>{{u.username}}</td>
                    <td>{{u.role}}</td>

                    <td>

                        <a href="/users/edit/{{u.user_id}}" class="btn btn-warning btn-sm">
                            Edit
                        </a>

                        <a href="/users/delete/{{u.user_id}}" class="btn btn-danger btn-sm">
                            Delete
                        </a>

                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</body>

</html>
