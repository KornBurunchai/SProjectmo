<!DOCTYPE html>
<html>

<head>
    <title>Asset Types</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

        <div class="container">

            <a class="navbar-brand" href="/admin">Asset System</a>

            <div>

                <a href="/admin" class="btn btn-outline-light me-2">Assets</a>

                <a href="/asset_types" class="btn btn-success me-2">Asset Types</a>

                <a href="/users" class="btn btn-outline-light">Users</a>

            </div>

        </div>

    </nav>

    <div class="container mt-4">

        <h2>Asset Types</h2>

        <!-- ADD + SEARCH -->
        <div class="mb-3 d-flex justify-content-between">

            <a href="/asset_types/add" class="btn btn-success">
                Add Type
            </a>

            <form action="/asset_types/search" method="get" class="d-flex">

                <input type="text" name="keyword" placeholder="Search type..." class="form-control me-2">

                <button class="btn btn-primary">Search</button>

            </form>

        </div>


        <table class="table table-bordered table-striped">

            <thead class="table-dark">

                <tr>
                    <th>ID</th>
                    <th>Type Name</th>
                    <th>Action</th>
                </tr>

            </thead>

            <tbody>

                {% for t in types %}

                <tr>

                    <td>{{t.type_id}}</td>
                    <td>{{t.type_name}}</td>

                    <td>

                        <a href="/asset_types/edit/{{t.type_id}}" class="btn btn-warning btn-sm">
                            Edit
                        </a>

                        <a href="/asset_types/delete/{{t.type_id}}" class="btn btn-danger btn-sm">
                            Delete
                        </a>

                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</body>

</html>
