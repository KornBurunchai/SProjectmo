<!DOCTYPE html>
<html>

<head>
    <title>Edit Asset Type</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

        <div class="container">

            <a class="navbar-brand" href="/admin">Asset System</a>

            <div>

                <a href="/admin" class="btn btn-outline-light me-2">Assets</a>
                <a href="/asset_types" class="btn btn-outline-light me-2">Asset Types</a>
                <a href="/users" class="btn btn-outline-light">Users</a>

            </div>

        </div>

    </nav>

    <div class="container mt-4">

        <h2>Edit Asset Type</h2>

        <div class="card p-4 shadow">

            <form action="/asset_types/update/{{type.type_id}}" method="POST">

                <div class="mb-3">

                    <label class="form-label">Type Name</label>

                    <input type="text" name="type_name" class="form-control" value="{{type.type_name}}" required>

                </div>

                <button class="btn btn-primary">
                    Update
                </button>

                <a href="/asset_types" class="btn btn-secondary">
                    Cancel
                </a>

            </form>

        </div>

    </div>

</body>

</html>
