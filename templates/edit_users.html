<!DOCTYPE html>
<html>

<head>
    <title>Edit User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

    <h2>Edit User</h2>

    <form action="/users/update/{{user.user_id}}" method="POST">

        <input name="first_name" class="form-control mb-2" value="{{user.first_name}}">

        <input name="last_name" class="form-control mb-2" value="{{user.last_name}}">

        <input name="email" class="form-control mb-2" value="{{user.email}}">

        <input name="username" class="form-control mb-2" value="{{user.username}}">

        <input name="password" class="form-control mb-2" placeholder="New Password">

        <select name="role" class="form-control mb-3">

            <option value="user" {% if user.role=="user" %}selected{% endif %}>User</option>

            <option value="admin" {% if user.role=="admin" %}selected{% endif %}>Admin</option>

        </select>

        <button class="btn btn-primary">Update</button>

        <a href="/users" class="btn btn-secondary">Back</a>

    </form>

</body>

</html>
