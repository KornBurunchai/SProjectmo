<!DOCTYPE html>
<html>

<head>
    <title>Add User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

    <h2>Add User</h2>

    <form action="/users/insert" method="POST">

        <input name="first_name" class="form-control mb-2" placeholder="First Name" required>

        <input name="last_name" class="form-control mb-2" placeholder="Last Name" required>

        <input name="email" class="form-control mb-2" placeholder="Email">

        <input name="username" class="form-control mb-2" placeholder="Username" required>

        <input name="password" class="form-control mb-2" placeholder="Password" required>

        <select name="role" class="form-control mb-3">

            <option value="user">User</option>
            <option value="admin">Admin</option>

        </select>

        <button class="btn btn-success">Save</button>

        <a href="/users" class="btn btn-secondary">Back</a>

    </form>

</body>

</html>
