<!DOCTYPE html>
<html>

<head>

    <title>Asset Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

        <div class="container">

            <a class="navbar-brand" href="/admin">Asset System</a>

            <div>

                <a href="/admin" class="btn btn-outline-light me-2">Assets</a>

                <a href="/asset_types" class="btn btn-outline-light me-2">Asset Types</a>

                <a href="/users" class="btn btn-outline-light me-2">Users</a>

            </div>

        </div>

    </nav>
    <div class="container mt-4">
        <h2>Asset Management</h2>


        <div class="mb-3 d-flex justify-content-between">

            <a href="/admin/add" class="btn btn-success">Add Asset</a>

            <!-- IMPORT FILE -->


            <form action="/admin/search" method="get" class="d-inline">
                <input type="text" name="keyword" placeholder="Search..." class="form-control d-inline w-auto">
                <button class="btn btn-primary">Search</button>
            </form>

        </div>

        <table class="table table-bordered table-striped">

            <thead class="table-dark">

                <tr>
                    <th>ID</th>
                    <th>Code</th>
                    <th>Name</th>
                    <th>Brand</th>
                    <th>Location</th>
                    <th>Status</th>
                    <th>Image</th>
                    <th>Action</th>
                </tr>

            </thead>

            <tbody>

                {% for a in assets %}

                <tr>

                    <td>{{a.asset_id}}</td>
                    <td>{{a.asset_code}}</td>
                    <td>{{a.asset_name}}</td>
                    <td>{{a.brand}}</td>
                    <td>{{a.location}}</td>
                    <td>{{a.status}}</td>

                    <td>

                        {% if a.image %}
                        <img src="/uploads/{{a.image}}" width="60">
                        {% endif %}

                    </td>

                    <td>

                        <a href="/admin/edit/{{a.asset_id}}" class="btn btn-warning btn-sm">
                            Edit
                        </a>

                        <a href="/admin/delete/{{a.asset_id}}" class="btn btn-danger btn-sm">
                            Delete
                        </a>

                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>
        <div class="mb-2 d-flex justify-content-end">

            <form action="/admin/import" method="POST" enctype="multipart/form-data" class="d-flex gap-2">

                <input type="file" name="file" accept=".xlsx,.csv" class="form-control w-auto">

                <button class="btn btn-info">
                    Import
                </button>

            </form>

        </div>
    </div>

</body>

</html>
